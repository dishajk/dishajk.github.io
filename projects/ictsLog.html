---
title: ICTS Log
layout: projects
---
{% assign sorted_resources = site.teaching | sort: 'date' | reverse %}

{% for resource in sorted_resources %}
    {% if resource.categories contains "icts" %}
    <div>
    {{ resource.date | date: "%d %B, %Y"}}
    {{ resource.content}}
    </div>
    {% endif %}
{% endfor %}
