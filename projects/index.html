---
title: Projects
layout: default
---
<div class="container pt-5">
    <h2>Projects</h2>
    {% assign sortedPro = site.data.projects | sort: 'date' | reverse %}

    <div class="container text-center mb-5">
      <div class="row row-cols-lg-5 d-flex justify-content-around">
        {% for project in site.data.projects %}
        <div class="col border justify-content-around project-tab">
          <a href="{{ project.link }}">
            {{ project.name }}
          </a>
        </div>
        {% endfor %}
      </div>
    </div>
</div>
