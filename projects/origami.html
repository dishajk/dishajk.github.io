<div class="container pt-5">
    <h2>Origami</h2>
    <div class="container text-center mb-5">
      <div class="row row-cols-lg-4 d-flex justify-content-around">
        {% for fold in site.origami %}
        <div class="col border justify-content-around">
          <a href="{{fold.url}}">
            <img src="{{ fold.heroimg }}" alt="{{ fold.name }},  {{ fold.type }}" class="figure-img img-fluid rounded origami">
            {{ fold.name }}
          </a>
        </div>
        {% endfor %}
      </div>
    </div>
    <span class="fs-6">Last updated on {{ page.date | date: "%d %B, %Y" }}</span>
</div>
